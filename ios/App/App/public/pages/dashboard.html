<div id="dashboard">

    <h1>Hey, User <span class="wave">👋</span></h1>

    <div id="recent-announcement">
        <svg class="icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
        <span><strong>Category</strong> — message</span>
    </div>

    <div id="finance-dashboard">
        <div class="finance-container rent">
            <div class="finance-top">
                <span class="finance-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M3 10h18" stroke="currentColor" stroke-width="1.6"/><path d="M7 15h4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
                </span>
                <h2>Rent</h2>
            </div>
            <h3>₱0.00</h3>
            <h5 id="rent-due">Due date · days left</h5>
        </div>

        <div class="finance-container electricity">
            <div class="finance-top">
                <span class="finance-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M13 2 4 14h6l-1 8 9-12h-6l1-8Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
                </span>
                <h2>Electricity</h2>
            </div>
            <h3>₱0.00</h3>
            <h5 id="electricity-due">↑ 0% vs last</h5>
        </div>
        
        <div class="finance-container water">
            <div class="finance-top">
                <span class="finance-icon">
                    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 3c3.2 4 6 7.6 6 11a6 6 0 0 1-12 0c0-3.4 2.8-7 6-11Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
                </span>
                <h2>Water</h2>
            </div>
            <h3>₱0.00</h3>
            <h5 id="water-due">↑ 0% vs last</h5>
        </div>
    </div>

    <div id="status-bar-container">
        <div class="status-bar-head">
            <span class="status-label">Your Status</span>
            <span class="status-current">Currently <strong>Status</strong></span>
        </div>
        <div class="status-bar-row">
            <button class="status-btn home active">
                <span class="dot"></span> Home
            </button>
            <button class="status-btn room">
                <span class="dot"></span> In Room
            </button>
            <button class="status-btn outside">
                <span class="dot"></span> Outside
            </button>
        </div>
    </div>

    <div id="status-board">
        <div class="board-head">
            <span>Members</span>
            <span class="board-sub">0 in room now</span>
        </div>

        <div class="member-row">
            <div class="avatar member-avatar">U</div>
            <div class="member-info">
                <span class="member-name">User Name <em>You</em></span>
            </div>
            <span class="badge home">Status</span>
        </div>
    </div>

</div>
